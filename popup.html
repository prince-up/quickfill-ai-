<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoFil Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>AutoFil</h2>
            <p class="subtitle">Your details securely stored locally.</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="personal">Personal</button>
            <button class="tab-btn" data-tab="location">Location</button>
            <button class="tab-btn" data-tab="socials">Socials</button>
            <button class="tab-btn" data-tab="education">Education</button>
            <button class="tab-btn" data-tab="experience">Experience</button>
        </div>

        <form id="detailsForm">
            <div class="tab-content active" id="tab-personal">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="citizenship">Citizenship</label>
                        <input type="text" id="citizenship" name="citizenship" placeholder="Indian">
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender">
                            <option value="">Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-location">
                <div class="form-group">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" name="address" placeholder="123 Innovation Way">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="district">District</label>
                        <input type="text" id="district" name="district" placeholder="Downtown">
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Metropolis">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" name="state" placeholder="NY">
                    </div>
                    <div class="form-group">
                        <label for="zipCode">Pincode / Zip Code</label>
                        <input type="text" id="zipCode" name="zipCode" placeholder="10001">
                    </div>
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" name="country" placeholder="USA">
                </div>
            </div>

            <div class="tab-content" id="tab-socials">
                <div class="form-group">
                    <label for="github">GitHub ID / URL</label>
                    <input type="text" id="github" name="github" placeholder="github.com/janedoe">
                </div>
                <div class="form-group">
                    <label for="linkedin">LinkedIn ID / URL</label>
                    <input type="text" id="linkedin" name="linkedin" placeholder="linkedin.com/in/janedoe">
                </div>
                <div class="form-group">
                    <label for="leetcode">LeetCode ID / URL</label>
                    <input type="text" id="leetcode" name="leetcode" placeholder="leetcode.com/janedoe">
                </div>
            </div>

            <div class="tab-content" id="tab-education">
                <div class="form-group">
                    <label for="collegeName">College Name</label>
                    <input type="text" id="collegeName" name="collegeName" placeholder="University of Technology">
                </div>
                <div class="form-group">
                    <label for="degree">Degree / Bachelor</label>
                    <input type="text" id="degree" name="degree" placeholder="B.S. Computer Science">
                </div>
                <div class="form-group">
                    <label for="cgpa">College CGPA</label>
                    <input type="text" id="cgpa" name="cgpa" placeholder="3.8">
                </div>
            </div>

            <div class="tab-content" id="tab-experience">
                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" name="companyName" placeholder="Tech Corp Inc.">
                </div>
                <div class="form-group">
                    <label for="internship">Internship Role</label>
                    <input type="text" id="internship" name="internship" placeholder="Software Engineer Intern">
                </div>
                <div class="form-group">
                    <label for="internshipDuration">Internship Duration</label>
                    <input type="text" id="internshipDuration" name="internshipDuration" placeholder="3 months">
                </div>
                <div class="form-group">
                    <label for="projects">Projects</label>
                    <textarea id="projects" name="projects" placeholder="Developed a full-stack web application..."></textarea>
                </div>
            </div>
            
            <button type="submit" id="saveBtn" class="btn-save">
                <span class="btn-text">Save Details</span>
            </button>
        </form>
        
        <div class="divider"></div>
        
        <button id="autofillBtn" class="btn-autofill">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            AutoFill This Page
        </button>
        <div id="statusMessage" class="status-hidden">
            <div class="toast">Successfully saved!</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
